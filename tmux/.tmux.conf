# Configure the theme
source-file ~/.tmux-theme.conf

# Terminal settings for proper color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# Set the delay between prefix and command
set -sg escape-time 10

# Mouse Support
set -g mouse on

# Change the starting number for panes and windows
set -g base-index 1
setw -g pane-base-index 1

# Keep the window name provided
set-window-option -g allow-rename off

# Update the status line every x seconds
set -g status-interval 1

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Copy-paste integration
#set-option -g default-command "reattach-to-user-namespace -l zsh"

# Remap prefix to Ctrl+Space
set -g prefix C-Space

# Unbind the original prefix
unbind C-b
unbind Escape

# Reload the configurations with prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Split window and use current path
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Smart pane switching and scrolling with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

# Smart mouse scrolling - passes through to vim, copy-mode for other programs
bind -n WheelUpPane if-shell "$is_vim" "send-keys -M" "select-pane -t= \; copy-mode -e \; send-keys -M"
bind -n WheelDownPane if-shell "$is_vim" "send-keys -M" "select-pane -t= \; send-keys -M"

# Resizing vertical panes
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Shift windows
set -g renumber-windows on
bind -n S-Left swap-window -t -1\; select-window -t -1
bind -n S-Right swap-window -t +1\; select-window -t +1

# Mark and swap flow
bind b select-pane -m
bind B swap-pane

# Mark and join flow
bind v select-pane -m
bind V join-pane

# Break pane to new window
bind o break-pane

# Create new session with name prompt
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# Move window left/right
bind H swap-window -t -1 \; select-window -t -1
bind L swap-window -t +1 \; select-window -t +1

# ============================================
# TPM - Tmux Plugin Manager
# ============================================
# Auto-install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum settings - auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
